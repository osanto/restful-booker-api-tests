name: CI

permissions:
  contents: write

on:
    push:
        branches-ignore:
          - main
    pull_request:
        branches:
          - main
    workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11.4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Display Python version and installed packages
        if: failure()
        run: |
          python --version
          pip list

      # Required: set LOGIN and PASSWORD in repo Settings → Secrets and variables → Actions
      - name: Set environment variables
        run: |
          echo "LOGIN=${{ secrets.LOGIN }}" >> $GITHUB_ENV
          echo "PASSWORD=${{ secrets.PASSWORD }}" >> $GITHUB_ENV

      - name: Run tests
        run: pytest --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Test summary
        if: always()
        run: |
          echo "## Test run finished"
          echo "Allure results:"
          ls -la allure-results 2>/dev/null || echo "(no allure-results directory)"

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Allure Report action from marketplace
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          allure_results: allure-results
          keep_reports: 20

      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_DIR: allure-history

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [run-tests]
    if: always()
    steps:
      - name: Test Summary
        continue-on-error: true
        run: |
          SUMMARY_FILE="${GITHUB_STEP_SUMMARY:-/dev/stdout}"

          RUN_TESTS="${{ needs.run-tests.result }}"

          {
            echo "## 🧪 CI Test Results Summary"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Run Tests | ${RUN_TESTS:-unknown} |"
            echo ""

            if [ "$RUN_TESTS" != "success" ]; then
              echo "❌ **Some checks failed. Please review the logs above.**"
            else
              echo "✅ **All checks passed!**"
            fi
          } >> "$SUMMARY_FILE" 2>&1 || true

          if [ "$RUN_TESTS" != "success" ]; then
            exit 1
          fi
